<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Favicon Generator - 文字/Emoji生成favicon图标"><meta property="og:title" content="Favicon Generator"><title>Favicon Generator</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column;align-items:center}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;width:100%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:800px;margin:0 auto;padding:24px;width:100%}.controls{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:20px}.controls .row{display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap}.controls label{font-size:13px;min-width:60px;color:#8b949e}.controls input[type=text]{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:8px 12px;border-radius:6px;font-size:14px;flex:1;min-width:150px}.controls input[type=color]{width:40px;height:36px;border:1px solid #30363d;border-radius:6px;cursor:pointer;background:transparent;padding:2px}.controls input[type=range]{flex:1;min-width:100px}.preview{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;margin-bottom:20px;text-align:center}.preview canvas{border:1px solid #30363d;border-radius:4px}.preview .sizes{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:16px}.preview .size-item{text-align:center}.preview .size-item span{display:block;font-size:11px;color:#8b949e;margin-top:4px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.emoji-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}.emoji-grid button{background:transparent;border:1px solid #30363d;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:18px}.emoji-grid button:hover{background:#21262d}</style></head><body><header><h1>🎨 Favicon Generator</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="controls"><div class="row"><label>文字/Emoji</label><input type="text" id="text" value="🚀" maxlength="4" oninput="draw()"><label>字号</label><input type="range" id="fontSize" min="20" max="200" value="120" oninput="draw()"><span id="sizeVal" style="font-size:12px;color:#8b949e">120</span></div><div class="row"><label>背景色</label><input type="color" id="bgColor" value="#1a73e8" onchange="draw()"><label>文字色</label><input type="color" id="textColor" value="#ffffff" onchange="draw()"><label>圆角</label><input type="range" id="radius" min="0" max="100" value="20" oninput="draw()"></div><div class="row"><label style="min-width:60px">快捷</label><div class="emoji-grid"><button onclick="setText('🚀')">🚀</button><button onclick="setText('⚡')">⚡</button><button onclick="setText('🔥')">🔥</button><button onclick="setText('💡')">💡</button><button onclick="setText('🌟')">🌟</button><button onclick="setText('A')">A</button><button onclick="setText('OK')">OK</button><button onclick="setText('★')">★</button><button onclick="setText('◆')">◆</button><button onclick="setText('♥')">♥</button></div></div></div><div class="preview"><canvas id="canvas" width="256" height="256"></canvas><div class="sizes"><div class="size-item"><canvas id="c16" width="16" height="16"></canvas><span>16×16</span></div><div class="size-item"><canvas id="c32" width="32" height="32"></canvas><span>32×32</span></div><div class="size-item"><canvas id="c64" width="64" height="64"></canvas><span>64×64</span></div></div></div><div class="toolbar"><button class="btn btn-primary" onclick="downloadFavicon(256)">⬇️ 下载 256×256 PNG</button><button class="btn btn-primary" onclick="downloadFavicon(32)">⬇️ 下载 32×32 PNG</button><button class="btn" onclick="downloadICO()">⬇️ 下载 ICO</button></div></div><script>let lang='zh';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}function setText(t){document.getElementById('text').value=t;draw()}
function draw(){const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');const size=256;canvas.width=size;canvas.height=size;const bg=document.getElementById('bgColor').value;const fg=document.getElementById('textColor').value;const r=parseInt(document.getElementById('radius').value);const fs=parseInt(document.getElementById('fontSize').value);document.getElementById('sizeVal').textContent=fs;ctx.clearRect(0,0,size,size);if(r>0){ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fillStyle=bg;ctx.fill()}else{ctx.fillStyle=bg;ctx.fillRect(0,0,size,size)}const text=document.getElementById('text').value||'?';ctx.fillStyle=fg;ctx.font='bold '+fs+'px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,size/2,size/2);[16,32,64].forEach(s=>{const c=document.getElementById('c'+s);c.getContext('2d').drawImage(canvas,0,0,s,s)})}
function downloadFavicon(s){const canvas=document.getElementById('canvas');const tmp=document.createElement('canvas');tmp.width=s;tmp.height=s;tmp.getContext('2d').drawImage(canvas,0,0,s,s);const a=document.createElement('a');a.href=tmp.toDataURL('image/png');a.download='favicon-'+s+'x'+s+'.png';a.click()}
function downloadICO(){const canvas=document.getElementById('canvas');const tmp=document.createElement('canvas');tmp.width=32;tmp.height=32;tmp.getContext('2d').drawImage(canvas,0,0,32,32);const a=document.createElement('a');a.href=tmp.toDataURL('image/png');a.download='favicon.ico';a.click()}
window.onload=draw;</script></body></html>
